<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | Formulaire</title>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="about.html">À propos</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Contactez-nous</h1>
            <p>Une question ou un projet ? Remplissez ce formulaire et notre équipe vous répondra sous 24 heures.</p>

            <!-- Formulaire HTML5 Complet -->
            <form action="#" method="post">
                <div>
                    <label for="nom">Nom complet :</label>
                    <input type="text" id="nom" name="nom" required placeholder="Ex: Jean Dupont">
                </div>

                <div>
                    <label for="email">Adresse e-mail :</label>
                    <input type="email" id="email" name="email" required placeholder="Ex: jean.dupont@email.com">
                </div>

                <div>
                    <label for="sujet">Sujet du message :</label>
                    <select id="sujet" name="sujet" required>
                        <option value="">-- Choisissez une option --</option>
                        <option value="devis">Demande de devis</option>
                        <option value="support">Support technique</option>
                        <option value="autre">Autre demande</option>
                    </select>
                </div>

                <div>
                    <label for="message">Votre message :</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Écrivez votre message ici..."></textarea>
                </div>

                <div>
                    <button type="submit">Envoyer le message</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Entreprise. Tous droits réservés.</p>
    </footer>

</body>
</html>
